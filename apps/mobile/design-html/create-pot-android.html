<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Create Pot — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="create-pot-screen-ios">

    <div class="screen-header" data-od-id="create-pot-header">
      <h1>Create Pot</h1>
      <span class="step-pill">Step 1/3</span>
    </div>

    <div class="card-label mt-4">How will collected funds be settled?</div>

    <div class="settlement-grid mt-2" data-od-id="settlement-options">
      <button class="settlement-card selected" data-od-id="settlement-billpay" id="settle-billpay">
        <div class="sc-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="sc-title">Bill Payment</div>
        <div class="sc-desc">Pay electricity/cable directly</div>
      </button>
      <button class="settlement-card" data-od-id="settlement-bank" id="settle-bank">
        <div class="sc-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M5 10v11m14-11v11"/></svg>
        </div>
        <div class="sc-title">Bank Payout</div>
        <div class="sc-desc">Withdraw settled cash to bank</div>
      </button>
    </div>

    <!-- Bill Payment Fields -->
    <div class="card card-lg mt-4" data-od-id="bill-details">
      <div class="card-label">Bill Category</div>
      <div class="toggle-row mt-2" data-od-id="bill-category-toggle">
        <button class="toggle-btn active" id="cat-electricity">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Electricity
        </button>
        <button class="toggle-btn" id="cat-cable">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.4)" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5h4l-3 5 5-5h-4l3-5z"/></svg>
          Cable TV
        </button>
      </div>

      <div class="card-label mt-4">Provider</div>
      <div class="option-list mt-2" data-od-id="provider-list">
        <div class="option-item selected" data-od-id="provider-ikedc">IKEJA Electric (IKEDC)</div>
        <div class="option-item" data-od-id="provider-ekedc">Eko Electric (EKEDC)</div>
        <div class="option-item" data-od-id="provider-aedc">Abuja Electric (AEDC)</div>
      </div>

      <div class="card-label mt-4">Meter Type</div>
      <div class="toggle-row mt-2" data-od-id="meter-type-toggle">
        <button class="toggle-btn active" id="meter-prepaid">PREPAID</button>
        <button class="toggle-btn" id="meter-postpaid">POSTPAID</button>
      </div>

      <div class="card-label mt-4">Meter Number</div>
      <div class="flex-row gap-2 mt-2" data-od-id="meter-input-row">
        <input class="input" placeholder="e.g. 0101234567" style="flex:1;" id="meter-input">
        <button class="btn-primary btn-primary-sm" id="verify-btn">Verify</button>
      </div>

      <!-- Verified state -->
      <div class="verified-banner" data-od-id="verified-banner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <div>
          <div class="v-label">Account Verified</div>
          <div class="v-name">Chidi Nwosu</div>
        </div>
      </div>
    </div>

    <button class="btn-primary mt-4" data-od-id="continue-splits-btn">
      Continue to Splits
      <span style="font-size:16px;">→</span>
    </button>

    <nav class="bottom-nav" data-od-id="bottom-nav">
      <a href="home-android.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="pots-android.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Pots
      </a>
      <div class="nav-center">
        <div class="nav-center-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      </div>
      <a href="activity-android.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Activity
      </a>
      <a href="profile-android.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </nav>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

<script>
  // Settlement type toggle
  document.querySelectorAll('.settlement-card').forEach(function(card) {
    card.addEventListener('click', function() {
      document.querySelectorAll('.settlement-card').forEach(function(c) { c.classList.remove('selected'); });
      this.classList.add('selected');
    });
  });
  // Toggle rows
  document.querySelectorAll('.toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var row = this.parentElement;
      row.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
    });
  });
  // Provider list
  document.querySelectorAll('.option-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.parentElement.querySelectorAll('.option-item').forEach(function(i) { i.classList.remove('selected'); });
      this.classList.add('selected');
    });
  });
</script>

</body>
</html>
