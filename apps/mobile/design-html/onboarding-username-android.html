<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Username — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-android">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="username-entry-screen-android" style="padding-bottom:60px;display:flex;flex-direction:column;">

    <div style="padding:32px 4px 16px;" data-od-id="username-header">
      <a href="onboarding-name-android.html" style="background:none;border:none;padding:0;font-size:20px;cursor:pointer;text-decoration:none;color:var(--fg);" data-od-id="back-btn">←</a>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-0.3px;margin-top:16px;">Choose a username</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">This is how others will find you on Paadi</p>
    </div>

    <div style="flex:1;padding:0 4px;" data-od-id="username-form">
      <div class="card-label mt-4">Username</div>
      <div style="display:flex;align-items:center;gap:0;border:2px solid var(--fg);border-radius:var(--radius);overflow:hidden;margin-top:8px;" data-od-id="username-input-row">
        <span style="padding:12px 0 12px 14px;font-size:14px;font-weight:600;color:var(--muted);background:var(--surface);">@</span>
        <input class="input" type="text" placeholder="seunade" style="border:none;border-radius:0;padding-left:2px;" data-od-id="username-input">
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:8px;">Letters, numbers, and underscores only. 3–30 characters.</p>

      <a href="onboarding-password-android.html" class="btn-primary mt-5" data-od-id="continue-btn">
        Continue
        <span style="font-size:16px;">→</span>
      </a>
    </div>

    <div style="height:20px;display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
