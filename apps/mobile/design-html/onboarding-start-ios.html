<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Get Started — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
  <style>
    .gs-illustration {
      width: 100%; height: 260px;
      background: linear-gradient(135deg, #FFFBEB 0%, #FFF7ED 50%, #FEF3C7 100%);
      border: 2px solid var(--fg);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      position: relative; overflow: hidden;
      box-shadow: 4px 4px 0 0 var(--fg);
    }
    .gs-illustration img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
    }
  </style>
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="onboarding-start-screen-ios" style="padding-bottom:60px;">

    <div style="text-align:center;padding:32px 8px 16px;" data-od-id="start-header">
      <div class="gs-illustration" data-od-id="gs-illustration">
        <img src="assets/get.jpg" alt="Split bills illustration" data-od-id="gs-illustration-img" />
      </div>

      <h1 style="font-size:26px;font-weight:700;letter-spacing:-0.5px;line-height:1.2;">Let's set up your first split</h1>
      <p style="font-size:14px;font-weight:500;color:var(--muted-60);margin-top:12px;max-width:32ch;margin-left:auto;margin-right:auto;">Join 50k+ people splitting bills, rent, and goals without the awkward "pay me back" texts.</p>
    </div>

    <div style="padding:0 8px;margin-top:24px;">
      <a href="onboarding-phone-ios.html" class="btn-primary" data-od-id="gs-get-started-btn">
        Get started
        <span style="font-size:18px;">→</span>
      </a>
      <button class="btn-secondary mt-3" data-od-id="gs-login-btn">I already have an account</button>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
