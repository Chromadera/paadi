<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Password — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-android">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="password-entry-screen-android" style="padding-bottom:60px;display:flex;flex-direction:column;">

    <div style="padding:32px 4px 16px;" data-od-id="password-header">
      <a href="onboarding-username-android.html" style="background:none;border:none;padding:0;font-size:20px;cursor:pointer;text-decoration:none;color:var(--fg);" data-od-id="back-btn">←</a>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-0.3px;margin-top:16px;">Create a password</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">Use at least 8 characters with a mix of letters, numbers, and symbols</p>
    </div>

    <div style="flex:1;padding:0 4px;" data-od-id="password-form">
      <div class="card-label mt-4">Password</div>
      <div style="position:relative;margin-top:8px;" data-od-id="password-input-wrap">
        <input class="input" type="password" placeholder="Min. 8 characters" style="padding-right:48px;" data-od-id="password-input" id="password-input">
        <button style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;padding:4px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:700;" data-od-id="show-password-btn" onclick="var p=document.getElementById('password-input');p.type=p.type==='password'?'text':'password';">Show</button>
      </div>

      <div style="display:flex;gap:6px;margin-top:12px;" data-od-id="password-strength">
        <div style="flex:1;height:4px;border-radius:2px;background:var(--accent);"></div>
        <div style="flex:1;height:4px;border-radius:2px;background:var(--accent);"></div>
        <div style="flex:1;height:4px;border-radius:2px;background:var(--accent);"></div>
        <div style="flex:1;height:4px;border-radius:2px;background:var(--border-subtle);"></div>
      </div>
      <p style="font-size:11px;color:var(--success-dark);font-weight:700;margin-top:6px;">Strong password</p>

      <div style="margin-top:16px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted-60);" data-od-id="password-hints">
        <div style="display:flex;align-items:center;gap:8px;"><span style="color:var(--success);font-weight:700;">✓</span> At least 8 characters</div>
        <div style="display:flex;align-items:center;gap:8px;"><span style="color:var(--success);font-weight:700;">✓</span> One uppercase letter</div>
        <div style="display:flex;align-items:center;gap:8px;"><span style="color:var(--success);font-weight:700;">✓</span> One number or symbol</div>
      </div>

      <a href="onboarding-pin-input-android.html" class="btn-primary mt-5" data-od-id="continue-btn">
        Continue
        <span style="font-size:16px;">→</span>
      </a>
    </div>

    <div style="height:20px;display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
