<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Profile — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="profile-screen-ios">

    <div class="screen-header" data-od-id="profile-header">
      <h1>Profile</h1>
    </div>

    <section class="card card-lg" style="display:flex;flex-direction:column;align-items:center;text-align:center;" data-od-id="profile-card">
      <img src="assets/avatars/avatar-1.png" alt="Chidi Nwosu" style="width:80px;height:80px;border-radius:50%;background:#FFD200;border:2px solid #111827;box-shadow:3px 3px 0 0 #111827;object-fit:cover;" data-od-id="profile-avatar" />
      <div class="font-black text-lg mt-4">Chidi Nwosu</div>
      <div class="text-xs font-bold text-muted mt-1">@chidi_nwosu</div>

      <div class="kyc-banner mt-5" data-od-id="kyc-banner">
        <div class="kyc-tier">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--warning-dark)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Tier 0 (Unverified)
        </div>
        <p style="font-size:11px;font-weight:600;color:rgba(146,64,14,0.6);margin-top:8px;line-height:1.5;">Verify your identity to increase transaction limits and enable direct bank withdrawals.</p>
        <button class="btn-primary mt-4" style="padding:10px;font-size:12px;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="kyc-verify-btn">Verify Identity</button>
      </div>
    </section>

    <div class="settings-list mt-5" data-od-id="settings-list">
      <a href="#" class="settings-item" data-od-id="setting-edit-profile">
        <svg class="si-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.6)" stroke-width="2.25"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Edit Profile</span>
        <svg class="si-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="settings-item" data-od-id="setting-payout">
        <svg class="si-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.6)" stroke-width="2.25"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14h18v-4"/><path d="M17 14h.01"/></svg>
        <span>Payout Accounts</span>
        <svg class="si-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="settings-item" data-od-id="setting-security">
        <svg class="si-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.6)" stroke-width="2.25"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <span>Security & PIN</span>
        <svg class="si-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="settings-item" data-od-id="setting-notifications">
        <svg class="si-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.6)" stroke-width="2.25"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span>Notifications</span>
        <svg class="si-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="settings-item" style="color:var(--danger);" data-od-id="setting-logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2.25"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><path d="M21 12H9"/></svg>
        <span>Log Out</span>
      </a>
    </div>

    <nav class="bottom-nav" data-od-id="bottom-nav">
      <a href="home-ios.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="pots-ios.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Pots
      </a>
      <div class="nav-center">
        <div class="nav-center-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      </div>
      <a href="activity-ios.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.35)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Activity
      </a>
      <a href="profile-ios.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </nav>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
