<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Profile Extended — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="profile-extended-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="profile-header">
      <h2 style="font-size:17px;font-weight:700;">Profile</h2>
      <a href="settings-android.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="settings-link">⚙️</a>
    </div>

    <div style="padding:16px 4px;text-align:center;" data-od-id="profile-card">
      <img src="assets/avatars/avatar-1.png" alt="Profile" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--fg);" data-od-id="profile-avatar">
      <h3 style="font-size:18px;font-weight:900;margin-top:12px;" data-od-id="profile-name">Chidi Okonkwo</h3>
      <p style="font-size:13px;color:var(--muted);margin-top:2px;" data-od-id="profile-handle">@chidi_okonkwo</p>
      <div style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:20px;background:#FEE2E2;font-size:12px;font-weight:700;color:#991B1B;" data-od-id="kyc-badge">
        <span style="width:6px;height:6px;border-radius:50%;background:#991B1B;"></span> Unverified
      </div>
    </div>

    <div style="padding:0 4px;margin-top:16px;" data-od-id="profile-stats">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);padding:16px;display:flex;justify-content:space-around;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="stats-card">
        <div style="text-align:center;" data-od-id="stat-pots">
          <div style="font-size:20px;font-weight:900;">12</div>
          <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.3px;">POTS</div>
        </div>
        <div style="width:1px;background:var(--border);"></div>
        <div style="text-align:center;" data-od-id="stat-paid">
          <div style="font-size:20px;font-weight:900;">₦284K</div>
          <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.3px;">PAID</div>
        </div>
        <div style="width:1px;background:var(--border);"></div>
        <div style="text-align:center;" data-od-id="stat-friends">
          <div style="font-size:20px;font-weight:900;">8</div>
          <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.3px;">FRIENDS</div>
        </div>
      </div>
    </div>

    <div style="padding:0 4px;margin-top:20px;" data-od-id="profile-menu">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);margin-bottom:16px;" data-od-id="menu-section">
        <a href="settings-android.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);border-bottom:1px solid var(--border);" data-od-id="settings-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">⚙️</div>
            <div style="font-size:15px;font-weight:700;">Settings</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="verification-android.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);border-bottom:1px solid var(--border);" data-od-id="verification-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🛡️</div>
            <div>
              <div style="font-size:15px;font-weight:700;">Verification</div>
              <div style="font-size:12px;color:var(--accent);">Incomplete</div>
            </div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="referral-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🎁</div>
            <div style="font-size:15px;font-weight:700;">Refer & Earn</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;" data-od-id="support-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">💬</div>
            <div style="font-size:15px;font-weight:700;">Support</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>

    <nav class="bottom-nav android" data-od-id="bottom-nav">
      <a href="home-android.html" class="nav-item" data-od-id="nav-home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="pots-android.html" class="nav-item" data-od-id="nav-pots">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Pots</span>
      </a>
      <a href="activity-android.html" class="nav-item" data-od-id="nav-activity">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Activity</span>
      </a>
      <a href="profile-android.html" class="nav-item active" data-od-id="nav-profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </nav>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
