<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Your Name — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="name-entry-screen-ios" style="display:flex;flex-direction:column;">

    <div style="padding:32px 4px 16px;" data-od-id="name-header">
      <a href="onboarding-otp-input-ios.html" style="background:none;border:none;padding:0;font-size:20px;cursor:pointer;text-decoration:none;color:var(--fg);" data-od-id="back-btn">←</a>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-0.3px;margin-top:16px;">What's your name?</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">Enter your name as it appears on your ID</p>
    </div>

    <div style="flex:1;padding:0 4px;" data-od-id="name-form">
      <div class="card-label mt-4">First Name</div>
      <input class="input mt-2" type="text" placeholder="Oluwaseun" data-od-id="first-name-input">

      <div class="card-label mt-4">Last Name</div>
      <input class="input mt-2" type="text" placeholder="Adebayo" data-od-id="last-name-input">

      <a href="onboarding-username-ios.html" class="btn-primary mt-5" data-od-id="continue-btn">
        Continue
        <span style="font-size:16px;">→</span>
      </a>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
