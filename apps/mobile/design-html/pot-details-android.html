<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Pot Details — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="pot-details-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="pot-details-header">
      <a href="pots-android.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="back-link">←</a>
      <h2 style="font-size:17px;font-weight:700;">Dinner Split</h2>
      <div style="width:20px;"></div>
    </div>

    <div style="padding:16px 4px;text-align:center;" data-od-id="pot-summary">
      <div style="font-size:13px;color:var(--muted);font-weight:700;letter-spacing:0.5px;">TOTAL POT</div>
      <div style="font-size:36px;font-weight:900;margin-top:4px;" data-od-id="pot-total">₦45,000</div>
      <div style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:20px;background:#DCFCE7;font-size:12px;font-weight:700;color:#166534;" data-od-id="pot-status">
        <span style="width:6px;height:6px;border-radius:50%;background:#166534;"></span> Active
      </div>
    </div>

    <div style="padding:0 4px;margin-top:16px;" data-od-id="pot-meta">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);padding:16px;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="meta-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;" data-od-id="meta-due">
          <span style="font-size:13px;color:var(--muted);">Due Date</span>
          <span style="font-size:13px;font-weight:700;">Oct 28, 2024</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;" data-od-id="meta-split">
          <span style="font-size:13px;color:var(--muted);">Split Type</span>
          <span style="font-size:13px;font-weight:700;">Equal</span>
        </div>
        <div style="display:flex;justify-content:space-between;" data-od-id="meta-per">
          <span style="font-size:13px;color:var(--muted);">Per Person</span>
          <span style="font-size:13px;font-weight:700;">₦9,000</span>
        </div>
      </div>
    </div>

    <div style="padding:0 4px;margin-top:20px;" data-od-id="members-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;" data-od-id="members-header">
        <span style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">Members</span>
        <span style="font-size:13px;font-weight:700;">5</span>
      </div>
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="members-list">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);" data-od-id="member-1">
          <img src="assets/avatars/avatar-1.png" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;">You</div>
            <div style="font-size:12px;color:var(--muted);">Paid ₦9,000</div>
          </div>
          <span style="font-size:12px;font-weight:700;color:#166534;">Paid</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);" data-od-id="member-2">
          <img src="assets/avatars/avatar-2.png" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;">Amaka</div>
            <div style="font-size:12px;color:var(--muted);">Paid ₦9,000</div>
          </div>
          <span style="font-size:12px;font-weight:700;color:#166534;">Paid</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;" data-od-id="member-3">
          <img src="assets/avatars/avatar-3.png" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;">Tunde</div>
            <div style="font-size:12px;color:var(--muted);">Owes ₦9,000</div>
          </div>
          <span style="font-size:12px;font-weight:700;color:#B45309;">Pending</span>
        </div>
      </div>
    </div>

    <div style="padding:16px 4px 0;" data-od-id="pot-actions">
      <button class="btn-primary" data-od-id="remind-btn">Remind Pending</button>
      <a href="pot-addbank-payout-android.html" style="display:block;text-align:center;margin-top:12px;padding:14px;border:2px solid var(--fg);border-radius:14px;background:var(--surface);font-size:15px;font-weight:700;box-shadow:2px 2px 0 0 var(--fg);text-decoration:none;color:var(--fg);" data-od-id="payout-btn">Payout to Bank</a>
    </div>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
