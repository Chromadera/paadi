<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Security — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="security-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="security-header">
      <a href="profile-ios.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="back-link">←</a>
      <h2 style="font-size:17px;font-weight:700;">Security</h2>
      <div style="width:20px;"></div>
    </div>

    <div style="padding:0 4px;margin-top:8px;" data-od-id="security-list">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);margin-bottom:16px;" data-od-id="pin-section">
        <a href="change-pin-ios.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);border-bottom:1px solid var(--border);" data-od-id="change-pin-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🔢</div>
            <div>
              <div style="font-size:15px;font-weight:700;">Change PIN</div>
              <div style="font-size:12px;color:var(--muted);">Update your 4-digit PIN</div>
            </div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="relogin-ios.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);" data-od-id="reset-pin-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🔄</div>
            <div>
              <div style="font-size:15px;font-weight:700;">Reset PIN</div>
              <div style="font-size:12px;color:var(--muted);">Forgot your PIN?</div>
            </div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>

      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="biometrics-section">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="face-id-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">😶</div>
            <div style="font-size:15px;font-weight:700;">Face ID</div>
          </div>
          <div style="width:48px;height:28px;background:var(--fg);border-radius:14px;position:relative;" data-od-id="face-id-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;right:2px;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;" data-od-id="auto-lock-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🔒</div>
            <div style="font-size:15px;font-weight:700;">Auto-Lock</div>
          </div>
          <span style="font-size:13px;color:var(--muted);">5 minutes</span>
        </div>
      </div>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
