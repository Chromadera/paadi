<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Pots Empty — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="pots-empty-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="pots-header">
      <h2 style="font-size:17px;font-weight:700;">Pots</h2>
      <a href="create-pot-android.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="add-pot-btn">+</a>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 4px;text-align:center;" data-od-id="empty-state">
      <div style="width:80px;height:80px;border:2px solid var(--border);border-radius:24px;display:flex;align-items:center;justify-content:center;background:var(--surface);margin-bottom:20px;" data-od-id="empty-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h3 style="font-size:18px;font-weight:900;">No pots yet</h3>
      <p style="font-size:14px;color:var(--muted-60);margin-top:8px;max-width:240px;line-height:1.5;">Create your first pot to start splitting bills and saving with friends.</p>
      <a href="create-pot-android.html" style="display:inline-block;margin-top:20px;padding:12px 24px;border:2px solid var(--fg);border-radius:14px;background:var(--surface);font-size:15px;font-weight:700;box-shadow:2px 2px 0 0 var(--fg);text-decoration:none;color:var(--fg);" data-od-id="create-first-pot-btn">Create a Pot</a>
    </div>

    <nav class="bottom-nav android" data-od-id="bottom-nav">
      <a href="home-android.html" class="nav-item" data-od-id="nav-home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="pots-android.html" class="nav-item active" data-od-id="nav-pots">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Pots</span>
      </a>
      <a href="activity-android.html" class="nav-item" data-od-id="nav-activity">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Activity</span>
      </a>
      <a href="profile-android.html" class="nav-item" data-od-id="nav-profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </nav>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
