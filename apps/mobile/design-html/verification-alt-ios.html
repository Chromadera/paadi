<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Verification Alt — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="verification-alt-screen-ios" style="padding-bottom:60px;">

    <div style="padding:32px 4px 16px;text-align:center;" data-od-id="verification-header">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;">🛡️</div>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-0.3px;">Identity Verification</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">We need to verify your identity to comply with regulations</p>
    </div>

    <div style="padding:0 4px;margin-top:24px;" data-od-id="verification-options">
      <button style="width:100%;padding:16px;border:2px solid var(--fg);border-radius:16px;background:var(--surface);display:flex;align-items:center;gap:12px;box-shadow:2px 2px 0 0 var(--fg);margin-bottom:12px;" data-od-id="option-bvn">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;">🏦</div>
        <div style="text-align:left;flex:1;">
          <div style="font-size:15px;font-weight:700;">BVN</div>
          <div style="font-size:12px;color:var(--muted);">Bank Verification Number</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--fg)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <button style="width:100%;padding:16px;border:2px solid var(--border);border-radius:16px;background:var(--surface);display:flex;align-items:center;gap:12px;" data-od-id="option-nin">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;">🪪</div>
        <div style="text-align:left;flex:1;">
          <div style="font-size:15px;font-weight:700;">NIN</div>
          <div style="font-size:12px;color:var(--muted);">National Identity Number</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--fg)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
