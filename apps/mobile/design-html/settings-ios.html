<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Settings — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="settings-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="settings-header">
      <a href="profile-ios.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="back-link">←</a>
      <h2 style="font-size:17px;font-weight:700;">Settings</h2>
      <div style="width:20px;"></div>
    </div>

    <div style="padding:0 4px;margin-top:8px;" data-od-id="settings-list">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);margin-bottom:16px;" data-od-id="account-section">
        <a href="edit-profile-ios.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);border-bottom:1px solid var(--border);" data-od-id="edit-profile-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">👤</div>
            <div style="font-size:15px;font-weight:700;">Edit Profile</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="verification-ios.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);border-bottom:1px solid var(--border);" data-od-id="verification-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🛡️</div>
            <div>
              <div style="font-size:15px;font-weight:700;">Verification</div>
              <div style="font-size:12px;color:var(--accent);">Incomplete</div>
            </div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="security-ios.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);" data-od-id="security-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🔒</div>
            <div style="font-size:15px;font-weight:700;">Security & PIN</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>

      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);margin-bottom:16px;" data-od-id="prefs-section">
        <a href="notifications-ios.html" style="display:flex;align-items:center;justify-content:space-between;padding:16px;text-decoration:none;color:var(--fg);border-bottom:1px solid var(--border);" data-od-id="notifications-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🔔</div>
            <div style="font-size:15px;font-weight:700;">Notifications</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="dark-mode-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🌙</div>
            <div style="font-size:15px;font-weight:700;">Dark Mode</div>
          </div>
          <div style="width:48px;height:28px;background:var(--border);border-radius:14px;position:relative;" data-od-id="dark-mode-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;left:2px;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;" data-od-id="language-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🌐</div>
            <div style="font-size:15px;font-weight:700;">Language</div>
          </div>
          <span style="font-size:13px;color:var(--muted);">English</span>
        </div>
      </div>

      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="support-section">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="help-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">❓</div>
            <div style="font-size:15px;font-weight:700;">Help Center</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;" data-od-id="logout-row">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;">🚪</div>
            <div style="font-size:15px;font-weight:700;color:#DC2626;">Log Out</div>
          </div>
        </div>
      </div>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
