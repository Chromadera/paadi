<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Verification — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="verification-screen-ios" style="padding-bottom:60px;">

    <div style="padding:32px 4px 16px;" data-od-id="verification-header">
      <button style="background:none;border:none;padding:0;font-size:20px;cursor:pointer;" data-od-id="back-btn">←</button>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-0.3px;margin-top:16px;">Verify your identity</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">Complete verification to unlock all features</p>
    </div>

    <div style="padding:0 4px;margin-top:16px;" data-od-id="verification-steps">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);padding:16px;margin-bottom:12px;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="step-bvn">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;">🆔</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:700;">BVN Verification</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">Link your Bank Verification Number</div>
          </div>
          <span style="font-size:12px;font-weight:700;color:var(--accent);border:1.5px solid var(--accent);padding:3px 10px;border-radius:20px;">Start</span>
        </div>
      </div>

      <div style="border:2px solid var(--border);border-radius:16px;background:var(--surface);padding:16px;margin-bottom:12px;opacity:0.6;" data-od-id="step-nin">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;">🪪</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:700;">NIN Verification</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">National Identity Number</div>
          </div>
          <span style="font-size:12px;font-weight:700;color:var(--muted);border:1.5px solid var(--border);padding:3px 10px;border-radius:20px;">Locked</span>
        </div>
      </div>

      <div style="border:2px solid var(--border);border-radius:16px;background:var(--surface);padding:16px;opacity:0.6;" data-od-id="step-id">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;">📷</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:700;">ID Document</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">Upload a valid government ID</div>
          </div>
          <span style="font-size:12px;font-weight:700;color:var(--muted);border:1.5px solid var(--border);padding:3px 10px;border-radius:20px;">Locked</span>
        </div>
      </div>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
