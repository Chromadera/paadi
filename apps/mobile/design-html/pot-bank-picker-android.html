<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Bank Picker — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="bank-picker-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="bank-picker-header">
      <a href="pot-addbank-payout-android.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="back-link">←</a>
      <h2 style="font-size:17px;font-weight:700;">Select Bank</h2>
      <div style="width:20px;"></div>
    </div>

    <div style="padding:8px 4px 0;" data-od-id="bank-search">
      <div style="position:relative;" data-od-id="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="input" type="text" placeholder="Search banks..." style="padding-left:36px;" data-od-id="bank-search-input">
      </div>
    </div>

    <div style="padding:0 4px;margin-top:16px;" data-od-id="saved-banks">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Saved Accounts</div>
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="saved-list">
        <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);" data-od-id="bank-1">
          <div style="width:40px;height:40px;border-radius:10px;background:#FEF3C7;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#92400E;">GT</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:700;">GTBank</div>
            <div style="font-size:12px;color:var(--muted);">•••• 4582</div>
          </div>
          <div style="width:20px;height:20px;border-radius:50%;border:2px solid var(--fg);display:flex;align-items:center;justify-content:center;" data-od-id="radio-1">
            <div style="width:10px;height:10px;border-radius:50%;background:var(--fg);"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;" data-od-id="bank-2">
          <div style="width:40px;height:40px;border-radius:10px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#1E40AF;">UB</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:700;">UBA</div>
            <div style="font-size:12px;color:var(--muted);">•••• 9012</div>
          </div>
          <div style="width:20px;height:20px;border-radius:50%;border:2px solid var(--border);" data-od-id="radio-2"></div>
        </div>
      </div>
    </div>

    <div style="padding:0 4px;margin-top:20px;" data-od-id="all-banks">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">All Banks</div>
      <div style="border:2px solid var(--border);border-radius:16px;background:var(--surface);overflow:hidden;" data-od-id="banks-list">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);" data-od-id="bank-3">
          <div style="width:36px;height:36px;border-radius:8px;background:#F3E8FF;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#7C3AED;">Z</div>
          <div style="font-size:14px;font-weight:700;">Zenith Bank</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);" data-od-id="bank-4">
          <div style="width:36px;height:36px;border-radius:8px;background:#ECFDF5;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#047857;">A</div>
          <div style="font-size:14px;font-weight:700;">Access Bank</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);" data-od-id="bank-5">
          <div style="width:36px;height:36px;border-radius:8px;background:#FFF1F2;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#BE123C;">F</div>
          <div style="font-size:14px;font-weight:700;">First Bank</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;" data-od-id="bank-6">
          <div style="width:36px;height:36px;border-radius:8px;background:#F0F9FF;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#0369A1;">K</div>
          <div style="font-size:14px;font-weight:700;">Kuda Bank</div>
        </div>
      </div>
    </div>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
