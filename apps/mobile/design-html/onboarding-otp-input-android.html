<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Verification — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="otp-input-screen-ios" style="padding-bottom:60px;">

    <div style="padding:32px 4px 16px;" data-od-id="otp-header">
      <button style="background:none;border:none;padding:0;font-size:20px;cursor:pointer;" data-od-id="back-btn">←</button>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-0.3px;margin-top:16px;">Enter verification code</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">We sent a 6-digit code to <strong style="color:var(--fg);">+234 801 234 5678</strong></p>
    </div>

    <div style="padding:0 4px;" data-od-id="otp-form">
      <div style="display:flex;gap:8px;justify-content:center;margin-top:24px;" data-od-id="otp-boxes">
        <div style="width:44px;height:52px;border:2px solid var(--fg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--surface);" data-od-id="otp-1">3</div>
        <div style="width:44px;height:52px;border:2px solid var(--fg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--surface);" data-od-id="otp-2">8</div>
        <div style="width:44px;height:52px;border:2px solid var(--fg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--surface);" data-od-id="otp-3">2</div>
        <div style="width:44px;height:52px;border:2px solid var(--fg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--surface);" data-od-id="otp-4">7</div>
        <div style="width:44px;height:52px;border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--surface);" data-od-id="otp-5"></div>
        <div style="width:44px;height:52px;border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--surface);" data-od-id="otp-6"></div>
      </div>

      <a href="onboarding-name-android.html" class="btn-primary mt-4" data-od-id="verify-btn">
        Verify & Continue
        <span style="font-size:16px;">→</span>
      </a>

      <p style="font-size:13px;color:var(--muted);text-align:center;margin-top:24px;" data-od-id="resend-text">
        Didn't receive it? <span style="color:var(--fg);font-weight:700;cursor:pointer;">Resend code</span> in 0:47
      </p>
    </div>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
