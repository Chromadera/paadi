<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Notifications — Android</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame android" data-od-id="device-frame-ios">
  <div style="height:24px;background:var(--bg);"></div>

  <div class="device-screen" data-od-id="notifications-screen-ios" style="padding-bottom:60px;">

    <div class="ios-header" data-od-id="notifications-header">
      <a href="settings-android.html" style="font-size:20px;text-decoration:none;color:var(--fg);" data-od-id="back-link">←</a>
      <h2 style="font-size:17px;font-weight:700;">Notifications</h2>
      <div style="width:20px;"></div>
    </div>

    <div style="padding:0 4px;margin-top:8px;" data-od-id="notifications-list">
      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);margin-bottom:16px;" data-od-id="push-section">
        <div style="padding:12px 16px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);">Push Notifications</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="toggle-payments">
          <div style="font-size:15px;font-weight:700;">Payment Updates</div>
          <div style="width:48px;height:28px;background:var(--fg);border-radius:14px;position:relative;" data-od-id="payments-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;right:2px;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="toggle-pots">
          <div style="font-size:15px;font-weight:700;">Pot Invites</div>
          <div style="width:48px;height:28px;background:var(--fg);border-radius:14px;position:relative;" data-od-id="pots-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;right:2px;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="toggle-reminders">
          <div style="font-size:15px;font-weight:700;">Due Date Reminders</div>
          <div style="width:48px;height:28px;background:var(--fg);border-radius:14px;position:relative;" data-od-id="reminders-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;right:2px;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;" data-od-id="toggle-promo">
          <div style="font-size:15px;font-weight:700;">Promotions</div>
          <div style="width:48px;height:28px;background:var(--border);border-radius:14px;position:relative;" data-od-id="promo-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;left:2px;"></div>
          </div>
        </div>
      </div>

      <div style="border:2px solid var(--fg);border-radius:16px;background:var(--surface);overflow:hidden;box-shadow:2px 2px 0 0 var(--fg);" data-od-id="email-section">
        <div style="padding:12px 16px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);">Email Notifications</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);" data-od-id="toggle-email-summary">
          <div style="font-size:15px;font-weight:700;">Weekly Summary</div>
          <div style="width:48px;height:28px;background:var(--fg);border-radius:14px;position:relative;" data-od-id="email-summary-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;right:2px;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;" data-od-id="toggle-email-marketing">
          <div style="font-size:15px;font-weight:700;">Marketing</div>
          <div style="width:48px;height:28px;background:var(--border);border-radius:14px;position:relative;" data-od-id="email-marketing-toggle">
            <div style="width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;top:2px;left:2px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div style="height:20px;background:var(--bg);display:flex;align-items:center;justify-content:center;"><div style="width:120px;height:4px;background:var(--fg);border-radius:2px;"></div></div>

  </div>
</div>

</body>
</html>
