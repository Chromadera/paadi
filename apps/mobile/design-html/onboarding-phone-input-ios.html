<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi Phone Entry — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="phone-input-screen-ios" style="padding-bottom:60px;">

    <div style="text-align:center;padding:48px 8px 16px;" data-od-id="phone-header">
      <div class="brand-mark" style="width:56px;height:56px;border-radius:16px;font-size:24px;margin:0 auto 16px;">P</div>
      <h1 style="font-size:26px;font-weight:900;letter-spacing:-0.3px;">Welcome to Paadi</h1>
      <p style="font-size:14px;color:var(--muted-60);margin-top:6px;">Split bills, save together, settle automatically.</p>
    </div>

    <div style="padding:0 4px;" data-od-id="phone-form">
      <div class="card-label mt-4">Phone Number</div>
      <div class="phone-input-row mt-2" data-od-id="phone-input-row">
        <div class="country-code">
          <span style="font-size:18px;">🇳🇬</span>
          +234
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(17,24,39,0.4)" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <input class="input" type="tel" value="801 234 5678" data-od-id="phone-input">
      </div>

      <button class="btn-primary mt-4" data-od-id="send-code-btn">
        Send Verification Code
        <span style="font-size:16px;">→</span>
      </button>

      <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5;" data-od-id="terms-text">
        By continuing, you agree to Paadi's <span style="color:var(--fg);font-weight:700;">Terms of Service</span> and <span style="color:var(--fg);font-weight:700;">Privacy Policy</span>. Standard SMS rates may apply.
      </p>
    </div>

    <div style="margin-top:32px;text-align:center;" data-od-id="alt-options">
      <div style="position:relative;margin-bottom:16px;">
        <hr style="border:0;border-top:1px solid var(--border);">
        <span style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 12px;font-size:11px;font-weight:700;color:var(--muted);">or continue with</span>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button style="width:52px;height:52px;border:2px solid var(--fg);border-radius:14px;box-shadow:2px 2px 0 0 var(--fg);display:flex;align-items:center;justify-content:center;background:var(--surface);" data-od-id="social-google">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>
        <button style="width:52px;height:52px;border:2px solid var(--fg);border-radius:14px;box-shadow:2px 2px 0 0 var(--fg);display:flex;align-items:center;justify-content:center;background:var(--surface);" data-od-id="social-apple">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#111827"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.5-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25C11.86 5.04 13.69 3.18 15.77 3c.3 2.56-2.26 4.47-3.74 4.25z"/></svg>
        </button>
      </div>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
