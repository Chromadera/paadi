<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paadi — iOS</title>
  <link rel="stylesheet" href="css/paadi-mobile.css" />
  <style>
    .split-illustration {
      width: 100%; height: 280px;
      background: linear-gradient(135deg, #FFFBEB 0%, #FFF7ED 50%, #FEF3C7 100%);
      border: 2px solid var(--fg); border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      margin: 40px 0 32px; position: relative; overflow: hidden;
      box-shadow: 4px 4px 0 0 var(--fg);
    }
    .split-bill-card {
      background: var(--surface); border: 2px solid var(--fg);
      border-radius: var(--radius); padding: 14px 16px;
      box-shadow: 3px 3px 0 0 var(--fg);
      width: 220px;
    }
    .split-bill-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .split-bill-header img {
      width: 28px; height: 28px; border-radius: 50%;
    }
    .split-bill-header span {
      font-size: 12px; font-weight: 700;
    }
    .split-bill-total {
      font-size: 20px; font-weight: 900; margin-bottom: 10px;
    }
    .split-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-top: 1px dashed var(--border-subtle);
    }
    .split-row:first-of-type { border-top: none; }
    .split-row img {
      width: 20px; height: 20px; border-radius: 50%;
    }
    .split-row span { font-size: 12px; font-weight: 700; }
    .split-row .split-paid {
      font-size: 11px; font-weight: 800; color: var(--success-dark);
      background: var(--success-bg); padding: 2px 8px;
      border-radius: var(--radius-full); border: 1px solid var(--success-border);
    }
    .split-badge {
      position: absolute; top: 24px; right: 24px;
      background: var(--accent); color: var(--fg);
      font-size: 11px; font-weight: 800; padding: 6px 12px;
      border: 2px solid var(--fg); border-radius: var(--radius-full);
      box-shadow: 2px 2px 0 0 var(--fg);
    }
  </style>
</head>
<body>

<div class="device-frame ios" data-od-id="device-frame-ios">
  <div style="height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;background:var(--bg);">
    <div style="width:120px;height:32px;background:#111827;border-radius:18px;"></div>
  </div>

  <div class="device-screen" data-od-id="pre-onboarding-split-ios" style="display:flex;flex-direction:column;justify-content:space-between;padding-bottom:60px;">

    <div data-od-id="split-content">
      <div class="split-illustration" data-od-id="split-illustration">
        <div class="split-bill-card" data-od-id="split-card">
          <div class="split-bill-header" data-od-id="split-card-header">
            <img src="assets/avatars/avatar-6.png" alt="" />
            <span>Dinner at Yellow Chili</span>
          </div>
          <div class="split-bill-total" data-od-id="split-total">₦45,000</div>
          <div class="split-row">
            <div style="display:flex;align-items:center;gap:6px;">
              <img src="assets/avatars/avatar-6.png" alt="" />
              <span>You</span>
            </div>
            <span>₦15,000</span>
          </div>
          <div class="split-row">
            <div style="display:flex;align-items:center;gap:6px;">
              <img src="assets/avatars/avatar-2.png" alt="" />
              <span>Ade</span>
            </div>
            <span class="split-paid">Paid</span>
          </div>
          <div class="split-row">
            <div style="display:flex;align-items:center;gap:6px;">
              <img src="assets/avatars/avatar-3.png" alt="" />
              <span>Tolu</span>
            </div>
            <span class="split-paid">Paid</span>
          </div>
        </div>
        <div class="split-badge" data-od-id="split-badge">Split</div>
      </div>

      <h1 style="font-size:26px;font-weight:700;letter-spacing:-0.5px;line-height:1.2;text-align:center;" data-od-id="split-headline">Split bills instantly</h1>
      <p style="font-size:14px;font-weight:500;color:var(--muted-60);margin-top:12px;max-width:32ch;margin-left:auto;margin-right:auto;text-align:center;line-height:1.5;" data-od-id="split-desc">No more awkward reminders. Everyone pays their fair share.</p>
    </div>

    <div data-od-id="split-footer">
      <div class="onboard-dots" data-od-id="split-dots">
        <div class="onboard-dot" data-od-id="split-dot-1"></div>
        <div class="onboard-dot" data-od-id="split-dot-2"></div>
        <div class="onboard-dot active" data-od-id="split-dot-3"></div>
      </div>

      <a href="onboarding-start-ios.html" class="btn-primary" data-od-id="split-get-started-btn">
        Get started
        <span style="font-size:18px;">→</span>
      </a>
    </div>

    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
